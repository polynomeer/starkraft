name: Nightly

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  sim-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run soak harness
        run: ./gradlew --no-daemon :sim:soak --args="--minutes 1 --units 240 --seed 1234 --reportEverySec 30"

  replay-compat:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run deterministic and replay compatibility tests
        run: |
          ./gradlew --no-daemon :sim:test --tests starkraft.sim.DeterminismTest
          ./gradlew --no-daemon :sim:test --tests starkraft.sim.ReplayHashTest
          ./gradlew --no-daemon :sim:test --tests starkraft.sim.ReplayIOTest

  tools-health:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run tools tests and data/map checks
        env:
          STARKRAFT_TOOLS_HEALTH_TMP_DIR: /tmp/starkraft-tools-health
        run: ./gradlew --no-daemon :tools:smoke

      - name: Upload nightly tools health artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-tools-health
          path: /tmp/starkraft-tools-health
          if-no-files-found: ignore
