name: Nightly

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  go-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Vet server packages
        run: |
          cd server
          go vet ./...

      - name: Vet client packages
        run: |
          cd client
          go vet ./...

  sim-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Validate script shell syntax
        run: |
          bash -n scripts/smoke_run.sh
          bash -n scripts/e2e_server_bots_smoke.sh
          bash -n scripts/bootstrap_dev.sh
          bash -n scripts/play_sim_smoke.sh
          bash -n scripts/play_stack_local.sh
          bash -n scripts/play_sim_graphical.sh
          bash -n scripts/tools_health.sh

      - name: Run soak harness
        run: ./gradlew --no-daemon :sim:soak --args="--minutes 1 --units 240 --seed 1234 --reportEverySec 30"

      - name: Run sim play smoke
        run: ./scripts/play_sim_smoke.sh

  replay-compat:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run deterministic and replay compatibility tests
        run: |
          ./gradlew --no-daemon :sim:test --tests starkraft.sim.DeterminismTest
          ./gradlew --no-daemon :sim:test --tests starkraft.sim.ReplayHashTest
          ./gradlew --no-daemon :sim:test --tests starkraft.sim.ReplayIOTest

  tools-health:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run tools tests and data/map checks
        env:
          STARKRAFT_TOOLS_HEALTH_TMP_DIR: /tmp/starkraft-tools-health
        run: ./gradlew --no-daemon :tools:smoke

      - name: Print nightly tools health summary
        if: always()
        run: |
          if [ -f /tmp/starkraft-tools-health/summary.json ]; then
            cat /tmp/starkraft-tools-health/summary.json
          else
            echo '{"result":"missing","summary":"not found"}'
          fi

      - name: Validate nightly tools health summary payload
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          p = Path('/tmp/starkraft-tools-health/summary.json')
          assert p.exists(), 'summary.json missing'
          data = json.loads(p.read_text())
          assert data.get('result') == 'ok', data
          assert data.get('outputVersion') == 1, data
          files = data.get('files', {})
          for key in ('replayMeta', 'replayStats', 'replayVerify', 'mapGenerate', 'mapValidate', 'dataValidate'):
            assert key in files, (key, data)
          PY

      - name: Upload nightly tools health artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-tools-health
          path: /tmp/starkraft-tools-health
          if-no-files-found: ignore

      - name: Upload nightly tools test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-tools-test-reports
          path: |
            tools/build/reports/tests/test
            tools/build/test-results/test
          if-no-files-found: ignore
