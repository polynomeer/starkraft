name: Nightly

on:
  schedule:
    - cron: "0 17 * * *"
  workflow_dispatch:

jobs:
  sim-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run soak harness
        run: ./gradlew --no-daemon :sim:soak --args="--minutes 1 --units 240 --seed 1234 --reportEverySec 30"

  replay-compat:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run deterministic and replay compatibility tests
        run: |
          ./gradlew --no-daemon :sim:test --tests starkraft.sim.DeterminismTest
          ./gradlew --no-daemon :sim:test --tests starkraft.sim.ReplayHashTest
          ./gradlew --no-daemon :sim:test --tests starkraft.sim.ReplayIOTest

  tools-health:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Run tools tests and data/map checks
        run: |
          ./gradlew --no-daemon :tools:test
          ./gradlew --no-daemon --quiet :tools:run --args="data validate --dir sim/src/main/resources/data --json" > /tmp/starkraft-nightly-data.json
          ./gradlew --no-daemon --quiet :tools:run --args="map generate /tmp/starkraft-nightly-map.json --width 64 --height 64 --seed 1337 --json" > /tmp/starkraft-nightly-map-generate.json
          ./gradlew --no-daemon --quiet :tools:run --args="map validate /tmp/starkraft-nightly-map.json --json" > /tmp/starkraft-nightly-map-validate.json
          python3 - <<'PY'
          import json
          from pathlib import Path
          data = json.loads(Path('/tmp/starkraft-nightly-data.json').read_text())
          gen = json.loads(Path('/tmp/starkraft-nightly-map-generate.json').read_text())
          val = json.loads(Path('/tmp/starkraft-nightly-map-validate.json').read_text())
          assert data.get('result') == 'ok', data
          assert gen.get('result') == 'generated', gen
          assert val.get('result') == 'ok', val
          PY
