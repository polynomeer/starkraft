name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  sim-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build and test sim
        run: ./gradlew --no-daemon :sim:build

      - name: Smoke run sim
        run: ./gradlew --no-daemon :sim:run --args="--ticks 20 --noSleep"

      - name: Smoke run graphical client in headless mode
        run: |
          ./gradlew --no-daemon :sim:run --args="--ticks 20 --noSleep --snapshotEvery 1 --snapshotOut /tmp/starkraft-snapshots.ndjson"
          ./gradlew --no-daemon :sim:graphicalClient --args="--headless --headlessTicks 20 /tmp/starkraft-snapshots.ndjson /tmp/starkraft-client-input.ndjson"

  tools-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build and test tools
        run: ./gradlew --no-daemon :tools:build

      - name: Smoke run tools replay meta
        run: |
          ./gradlew --no-daemon :sim:run --args="--script sim/scripts/sample.script --ticks 2 --noSleep --replayDump /tmp/starkraft-tools-smoke.replay.json"
          ./gradlew --no-daemon :tools:run --args="replay meta /tmp/starkraft-tools-smoke.replay.json"

      - name: Run tools health contract smoke
        env:
          STARKRAFT_TOOLS_HEALTH_TMP_DIR: /tmp/starkraft-tools-health
        run: ./gradlew --no-daemon :tools:smoke

      - name: Upload tools test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tools-test-reports
          path: |
            tools/build/reports/tests/test
            tools/build/test-results/test
          if-no-files-found: ignore

      - name: Upload tools health artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tools-health
          path: /tmp/starkraft-tools-health
          if-no-files-found: ignore

  server-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: server/go.mod

      - name: Build server packages
        run: go build ./...

      - name: Test server packages
        run: go test ./...

      - name: Verify server module files are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  client-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: client/go.mod

      - name: Build client packages
        run: go build ./...

      - name: Test client packages
        run: go test ./...

      - name: Verify client module files are tidy
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

  e2e-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [server-build-test, client-build-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Run server + bots smoke
        env:
          STARKRAFT_E2E_TMP_DIR: /tmp/starkraft-e2e
          STARKRAFT_E2E_PORT: "18080"
        run: ./scripts/e2e_server_bots_smoke.sh

      - name: Verify e2e replay keyframe hashes
        run: ./gradlew --no-daemon --quiet :tools:run --args="replay verify-ndjson /tmp/starkraft-e2e/server.replay.jsonl --json" > /tmp/starkraft-e2e/replay-verify.json

      - name: Export e2e replay stats JSON
        run: ./gradlew --no-daemon --quiet :tools:run --args="replay stats /tmp/starkraft-e2e/server.replay.jsonl --json" > /tmp/starkraft-e2e/replay-stats.json

      - name: Validate e2e replay JSON payloads
        run: |
          python3 - <<'PY'
          import json
          from pathlib import Path
          verify = json.loads(Path('/tmp/starkraft-e2e/replay-verify.json').read_text())
          stats = json.loads(Path('/tmp/starkraft-e2e/replay-stats.json').read_text())
          assert verify.get('result') == 'ok', f"unexpected verify result: {verify}"
          assert 'keyframesChecked' in verify, f"missing keyframesChecked: {verify}"
          assert stats.get('result') == 'ok', f"unexpected stats result: {stats}"
          for key in ('records', 'header', 'command', 'keyframe', 'matchEnd'):
              assert key in stats, f"missing {key}: {stats}"
          PY

      - name: Upload e2e replay stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-replay-stats
          path: |
            /tmp/starkraft-e2e/replay-stats.json
            /tmp/starkraft-e2e/replay-verify.json
          if-no-files-found: ignore

      - name: Upload e2e logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-logs
          path: /tmp/starkraft-e2e
          if-no-files-found: ignore
