name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  sim-build-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Build and test sim
        run: ./gradlew --no-daemon :sim:build

      - name: Smoke run sim
        run: ./gradlew --no-daemon :sim:run --args="--ticks 20 --noSleep"
